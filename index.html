<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Maple Padel Scoring</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1b5fc4" />
    <link rel="apple-touch-icon" href="icons-192.jpeg" />
    <!-- Akhir PWA Meta Tags -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&family=Russo+One&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      :root {
        --glass: rgba(255, 255, 255, 0.1);
        --glass-strong: rgba(255, 255, 255, 0.16);
        --glass-border: rgba(255, 255, 255, 0.28);
        --amber: #fbbf24;
        --amber-deep: #d97f0a;
        --coral: #fb7185;
        --coral-deep: #c13f58;
        --live: #67e8f9;
        --live-deep: #0891b2;
        --text: #f8fafc;
        --text-dim: rgba(248, 250, 252, 0.68);
        --text-faint: rgba(248, 250, 252, 0.4);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at 18% 12%,
            rgba(255, 255, 255, 0.28) 0%,
            transparent 42%
          ),
          radial-gradient(
            circle at 88% 82%,
            rgba(255, 255, 255, 0.14) 0%,
            transparent 46%
          ),
          linear-gradient(160deg, #5ec3f5 0%, #2e9be6 42%, #1b5fc4 100%);
        background-attachment: fixed;
        padding: 22px 14px 100px;
        position: relative;
        overflow-x: hidden;
      }
      .app {
        max-width: 660px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      .glass {
        background: var(--glass);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid var(--glass-border);
        border-radius: 22px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      header.glass {
        text-align: center;
        padding: 18px 16px;
        margin-bottom: 16px;
      }
      .brand-logo {
        display: block;
        margin: 0 auto;
        width: min(200px, 55%);
        height: auto;
        filter: drop-shadow(0 4px 14px rgba(0, 0, 0, 0.4));
      }
      header p {
        margin: 8px 0 0;
        color: var(--text-dim);
        font-size: 12px;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 700;
      }

      .toggles-row.glass {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
        padding: 10px 16px;
        margin-bottom: 16px;
        font-size: 12.5px;
        color: var(--text);
      }
      .toggle-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .switch {
        position: relative;
        width: 42px;
        height: 23px;
        flex-shrink: 0;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .switch .track {
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .switch .track:before {
        content: "";
        position: absolute;
        left: 3px;
        top: 3px;
        width: 17px;
        height: 17px;
        background: var(--text);
        border-radius: 50%;
        transition: transform 0.2s;
      }
      .switch input:checked + .track {
        background: var(--amber);
      }
      .switch input:checked + .track:before {
        transform: translateX(19px);
      }
      .switch.tb-switch input:checked + .track {
        background: var(--live);
      }
      .toggle-label b {
        color: var(--amber);
      }
      .toggle-label.tb-label b {
        color: var(--live);
      }

      .board.glass {
        padding: 6px 8px;
        margin-bottom: 16px;
      }
      .teams-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .team-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 16px;
        padding: 18px 12px;
      }
      .team-col.team-a {
        border-right: 1px solid rgba(255, 255, 255, 0.15);
        border-top: 3px solid var(--amber);
      }
      .team-col.team-b {
        border-top: 3px solid var(--coral);
      }

      .team-left {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
      }
      .name-block {
        flex: 1;
        min-width: 0;
      }

      .server-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        flex-shrink: 0;
        cursor: pointer;
        transition:
          background 0.2s,
          box-shadow 0.2s;
      }
      .team-col.team-a .server-dot.active {
        background: var(--amber);
        box-shadow: 0 0 10px var(--amber);
      }
      .team-col.team-b .server-dot.active {
        background: var(--coral);
        box-shadow: 0 0 10px var(--coral);
      }

      .name-input {
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-weight: 800;
        font-size: 16px;
        padding: 4px 2px;
        width: 100%;
        max-width: 100%;
        resize: none;
        overflow: hidden;
        line-height: 1.3;
        text-align: center;
        word-wrap: break-word;
        overflow-wrap: break-word;
        display: block;
      }
      .name-input:focus {
        outline: none;
        border-bottom-color: var(--amber);
      }

      .leaves {
        display: flex;
        gap: 3px;
        margin-top: 4px;
        font-size: 12px;
        justify-content: center;
      }
      .leaf-empty {
        color: rgba(255, 255, 255, 0.28);
      }

      .team-stats {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        width: 100%;
      }
      .stat-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
      }
      .stat-label {
        font-size: 9.5px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-dim);
        font-weight: 700;
      }
      .stat-label.points-head {
        color: var(--live);
      }
      .tb-box {
        display: none;
      }
      .board.tie-break-active .tb-box {
        display: flex;
      }

      /* --- Menyembunyikan keseluruhan kotak POIN saat Tie-Break aktif --- */
      .board.tie-break-active .team-stats .stat-box:first-child {
        display: none !important;
      }

      .set-cell {
        font-family: "Russo One", sans-serif;
        font-size: clamp(40px, 12vw, 64px);
        color: rgba(255, 255, 255, 0.25);
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.15),
          0 -1px 0 rgba(0, 0, 0, 0.6),
          0 2px 6px rgba(0, 0, 0, 0.4);
      }
      .set-cell.live {
        color: #fff;
        position: relative;
        text-shadow:
          0 1px 0 rgba(103, 232, 249, 0.8),
          0 2px 0 rgba(8, 145, 178, 0.5),
          0 -1px 0 rgba(0, 0, 0, 0.8),
          0 2px 10px rgba(103, 232, 249, 0.4),
          0 0 20px rgba(103, 232, 249, 0.25),
          0 4px 16px rgba(0, 0, 0, 0.4);
      }
      .set-cell.live:after {
        content: "";
        position: absolute;
        top: -2px;
        right: -10px;
        width: 6px;
        height: 6px;
        background: var(--live);
        border-radius: 50%;
        animation: pulse 1.2s infinite;
        box-shadow:
          0 0 8px var(--live),
          0 0 16px rgba(103, 232, 249, 0.4);
      }

      .tb-cell {
        font-family: "Russo One", sans-serif;
        font-size: clamp(40px, 12vw, 64px);
        color: rgba(255, 255, 255, 0.18);
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.1),
          0 -1px 0 rgba(0, 0, 0, 0.5);
      }
      .tb-cell.tb-active {
        color: #fff;
        text-shadow:
          0 1px 0 rgba(103, 232, 249, 0.8),
          0 2px 0 rgba(8, 145, 178, 0.5),
          0 -1px 0 rgba(0, 0, 0, 0.8),
          0 2px 10px rgba(103, 232, 249, 0.4),
          0 0 20px rgba(103, 232, 249, 0.25),
          0 4px 16px rgba(0, 0, 0, 0.4);
      }

      .points-cell {
        font-family: "Russo One", sans-serif;
        font-size: clamp(72px, 16vw, 96px);
        line-height: 1;
        letter-spacing: 1px;
        color: #fff;
        min-width: auto;
        text-align: center;
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 1),
          0 2px 0 rgba(255, 255, 255, 0.8),
          0 3px 0 rgba(200, 220, 255, 0.6),
          0 4px 0 rgba(103, 232, 249, 0.9),
          0 5px 0 rgba(8, 145, 178, 0.8),
          0 6px 0 rgba(0, 0, 0, 0.7),
          0 7px 0 rgba(0, 0, 0, 0.6),
          0 8px 8px rgba(0, 0, 0, 0.5),
          0 0 18px rgba(103, 232, 249, 0.6),
          0 0 36px rgba(103, 232, 249, 0.3),
          0 0 60px rgba(124, 58, 237, 0.12);
        background: linear-gradient(
          180deg,
          rgba(103, 232, 249, 0.1) 0%,
          rgba(124, 58, 237, 0.07) 50%,
          rgba(103, 232, 249, 0.04) 100%
        );
        border-radius: 12px;
        padding: 6px 6px;
        border: 1px solid rgba(103, 232, 249, 0.2);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.15),
          inset 0 -2px 0 rgba(0, 0, 0, 0.3),
          inset 0 0 14px rgba(103, 232, 249, 0.06),
          0 3px 12px rgba(0, 0, 0, 0.3),
          0 0 20px rgba(103, 232, 249, 0.1);
      }
      .points-cell.hidden {
        color: #fff;
      }
      .points-cell.flip {
        animation: flap 0.35s ease;
      }
      @keyframes flap {
        0% {
          transform: rotateX(90deg);
          opacity: 0.3;
        }
        60% {
          transform: rotateX(-12deg);
          opacity: 1;
        }
        100% {
          transform: rotateX(0);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.25;
        }
      }

      .status.glass {
        margin: 0 0 16px;
        text-align: center;
        font-size: 12.5px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-weight: 700;
        color: var(--text-dim);
        padding: 11px 12px;
        border-radius: 14px;
        transition: color 0.2s;
      }
      .status.hot {
        color: var(--live);
      }
      .status.match-over {
        color: #1a1330;
        background: linear-gradient(135deg, var(--amber), var(--coral));
        border: none;
        font-family: "Anton", sans-serif;
        font-size: 16px;
        letter-spacing: 1px;
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
      }

      .board-row {
        display: flex;
        align-items: stretch;
        gap: 8px;
        margin-bottom: 16px;
      }
      .board-row .board.glass {
        flex: 1;
        min-width: 0;
        margin-bottom: 0;
      }
      .side-btn {
        border: none;
        border-radius: 18px;
        width: 95px;
        min-width: 95px;
        max-width: 140px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: #1a1330;
        cursor: pointer;
        padding: 10px 12px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        transition:
          transform 0.08s,
          box-shadow 0.08s,
          opacity 0.15s;
      }
      .side-btn .plus {
        font-family: "Anton", sans-serif;
        font-size: 22px;
        line-height: 1;
      }
      .side-btn .tname {
        text-align: center;
        line-height: 1.15;
        max-width: 100%;
        white-space: pre-wrap; /* <-- Ini wajib agar tulisan merespon Enter */
        word-break: break-word;
      }
      .side-btn:active {
        transform: translateY(2px);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      }
      .side-btn.team-a {
        background: linear-gradient(180deg, var(--amber), var(--amber-deep));
      }
      .side-btn.team-b {
        background: linear-gradient(180deg, var(--coral), var(--coral-deep));
        color: #fff;
      }
      .side-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }
      .ctrl-btn {
        flex: 1;
        background: var(--glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        color: var(--text);
        border-radius: 12px;
        padding: 11px 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.4px;
      }
      .ctrl-btn:hover {
        background: var(--glass-strong);
      }
      .ctrl-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .log-panel.glass {
        padding: 16px 14px;
        margin-bottom: 14px;
      }
      .log-panel h3 {
        font-size: 11px;
        letter-spacing: 1.8px;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 0 0 10px;
        font-weight: 700;
      }
      .log-list {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 180px;
        overflow-y: auto;
      }
      .log-list li {
        font-size: 12.5px;
        color: var(--text-dim);
        padding: 8px 4px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .log-list li:first-child {
        color: var(--text);
        font-weight: 600;
      }
      .log-list:empty:before {
        content: "Belum ada poin dicatat.";
        display: block;
        padding: 10px 4px;
        color: var(--text-faint);
        font-size: 12.5px;
      }

      .export-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        background: linear-gradient(135deg, #10b981, #0891b2);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.35);
        padding: 13px 18px;
        border-radius: 14px;
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        box-shadow:
          0 6px 18px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
        transition:
          transform 0.12s,
          box-shadow 0.12s;
      }
      .export-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      }
      .export-btn:active {
        transform: translateY(0);
      }
      .export-btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .fullscreen-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.35);
        padding: 13px 18px;
        border-radius: 14px;
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        margin-top: 10px;
        box-shadow:
          0 6px 18px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
        transition:
          transform 0.12s,
          box-shadow 0.12s;
      }
      .fullscreen-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      }
      .fullscreen-btn:active {
        transform: translateY(0);
      }
      .fullscreen-btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      @media (max-width: 380px) {
        .points-cell {
          padding: 6px 4px;
        }
        .name-input {
          font-size: 13px;
        }
        .team-stats {
          gap: 10px;
        }
        .side-btn {
          width: 70px;
          min-width: 70px;
          max-width: 100px;
          padding: 8px 6px;
          gap: 4px;
        }
        .side-btn .plus {
          font-size: 18px;
        }
        .side-btn .tname {
          font-size: 9.5px;
        }
      }

      /* ===== Landscape phone: satu kolom (persis seperti desktop), hanya diperkecil agar muat di layar ===== */
      @media (orientation: landscape) and (max-height: 520px) {
        body {
          padding: 4px 8px 4px;
        }
        .app {
          max-width: 640px;
        }

        header.glass {
          padding: 4px 14px;
          margin-bottom: 4px;
        }
        .brand-logo {
          width: min(140px, 45%);
        }
        header p {
          font-size: 8.5px;
          letter-spacing: 2px;
          margin-top: 2px;
        }

        .toggles-row.glass {
          margin-bottom: 4px;
          padding: 4px 10px;
          font-size: 10.5px;
          gap: 8px;
        }

        .board-row {
          margin-bottom: 4px;
          gap: 4px;
        }
        .board.glass {
          padding: 2px 4px;
        }
        .team-col {
          padding: 4px 4px;
          gap: 3px;
        }
        .team-stats {
          gap: 3px;
        }
        .name-input {
          font-size: 15px;
          padding: 1px 2px;
        }

        .points-cell {
          font-size: clamp(42px, 14vw, 84px);
          line-height: 1;
          padding: 4px 6px;
          border-radius: 8px;
        }
        .set-cell,
        .tb-cell {
          font-size: clamp(24px, 8vw, 38px);
        }
        .stat-label {
          font-size: 8px;
          letter-spacing: 1px;
        }

        .side-btn {
          width: 80px;
          min-width: 80px;
          max-width: 120px;
          padding: 6px 8px;
          border-radius: 14px;
          gap: 3px;
        }
        .side-btn .plus {
          font-size: 17px;
        }
        .side-btn .tname {
          font-size: 9.5px;
        }
        .leaves {
          font-size: 9px;
          margin-top: 1px;
        }

        .controls {
          margin-bottom: 4px;
          gap: 6px;
        }
        .ctrl-btn {
          padding: 5px 4px;
          font-size: 10px;
        }

        .status.glass {
          display: none;
        }
        .log-panel.glass {
          display: none;
        }

        .export-btn {
          padding: 6px 12px;
          font-size: 10px;
          margin-top: 0;
        }
        .fullscreen-btn {
          padding: 6px 12px;
          font-size: 10px;
          margin-top: 4px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="col-left">
        <header class="glass">

            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"
              stroke="#fff"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>Export Excel</span>
        </button>

        <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M4 4h5M4 4v5M20 4h-5M20 4v5M4 20h5M4 20v-5M20 20h-5M20 20v-5"
              stroke="#fff"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>Fullscreen</span>
        </button>
      </div>
    </div>

    <script>
      (function () {
        const els = {
          nameA: document.getElementById("nameA"),
          nameB: document.getElementById("nameB"),
          btnA: document.getElementById("btnA"),
          btnB: document.getElementById("btnB"),
          btnAName: document.getElementById("btnAName"),
          btnBName: document.getElementById("btnBName"),
          undoBtn: document.getElementById("undoBtn"),
          resetBtn: document.getElementById("resetBtn"),
          exportBtn: document.getElementById("exportBtn"),
          goldenToggle: document.getElementById("goldenToggle"),
          tieBreakToggle: document.getElementById("tieBreakToggle"),
          statusBanner: document.getElementById("statusBanner"),
          board: document.getElementById("board"),
          pointsA: document.getElementById("pointsA"),
          pointsB: document.getElementById("pointsB"),
          leavesA: document.getElementById("leavesA"),
          leavesB: document.getElementById("leavesB"),
          serverDotA: document.getElementById("serverDotA"),
          serverDotB: document.getElementById("serverDotB"),
          logList: document.getElementById("logList"),
          setA: document.getElementById("setA"),
          setB: document.getElementById("setB"),
          tbA: document.getElementById("tbA"),
          tbB: document.getElementById("tbB"),
        };

        function freshState(teamA, teamB, golden) {
          return {
            teamA: teamA || "TIM A",
            teamB: teamB || "TIM B",
            golden: golden !== undefined ? !!golden : true,
            tieBreak: false,
            server: "A",
            setsWon: { A: 0, B: 0 },
            setHistory: [],
            games: { A: 0, B: 0 },
            points: { A: 0, B: 0 },
            tieBreakPoints: { A: 0, B: 0 },
            matchOver: false,
            winner: null,
            log: [],
          };
        }

        let state = freshState();
        let undoStack = [];
        let prevDisplay = { A: "0", B: "0", TBA: "", TBB: "" };

        function teamName(t) {
          const v = (t === "A" ? state.teamA : state.teamB).trim();
          return v || (t === "A" ? "Tim A" : "Tim B");
        }
        // Fungsi format nama khusus untuk tombol +1
        function formatBtnName(name) {
          return name
            .split("\n") // Pisahkan teks setiap kali ada baris baru
            .map((s) => s.trim()) // Bersihkan spasi depan/belakang
            .filter((s) => s !== "" && s !== "-") // Saring & buang semua baris kosong dan baris yang isinya cuma strip "-"
            .map((s) => (s.length > 10 ? s.substring(0, 10) + "..." : s)) // Potong maksimal 10 karakter
            .join("\n-\n"); // Rakit ulang secara paksa pakai 1 strip tunggal di antara setiap nama
        }

        function snapshot() {
          undoStack.push(JSON.stringify(state));
          if (undoStack.length > 60) undoStack.shift();
        }

        function checkSetWin(a, b) {
          if (a >= 6 && a - b >= 2) return "A";
          if (b >= 6 && b - a >= 2) return "B";
          if (a === 7 && b === 6) return "A";
          if (b === 7 && a === 6) return "B";
          return null;
        }

        function pointsDisplay() {
          if (state.tieBreak) {
            return {
              A: String(state.tieBreakPoints.A),
              B: String(state.tieBreakPoints.B),
            };
          }
          const labels = ["0", "15", "30", "40"];
          const a = state.points.A,
            b = state.points.B;
          if (a >= 3 && b >= 3) {
            if (a === b) return { A: "40", B: "40" };
            if (a > b) return { A: "AD", B: "40" };
            return { A: "40", B: "AD" };
          }
          return { A: labels[Math.min(a, 3)], B: labels[Math.min(b, 3)] };
        }

        function willWinGame(t) {
          if (state.tieBreak) return false;
          const o = t === "A" ? "B" : "A";
          const atDeuce =
            state.points.A >= 3 &&
            state.points.B >= 3 &&
            state.points.A === state.points.B;
          if (state.golden && atDeuce) return true;
          const p = state.points[t] + 1,
            q = state.points[o];
          return p >= 4 && p - q >= 2;
        }

        function willWinSet(t) {
          const o = t === "A" ? "B" : "A";
          const gT = state.games[t] + 1,
            gO = state.games[o];
          const aG = t === "A" ? gT : gO,
            bG = t === "A" ? gO : gT;
          return checkSetWin(aG, bG) === t;
        }

        function willWinMatch(t) {
          return state.setsWon[t] + 1 >= 2;
        }

        function checkTieBreakWin() {
          const a = state.tieBreakPoints.A,
            b = state.tieBreakPoints.B;
          if (a >= 7) return "A";
          if (b >= 7) return "B";
          return null;
        }

        function addPoint(team) {
          if (state.matchOver) return;
          snapshot();
          const other = team === "A" ? "B" : "A";

          if (state.tieBreak) {
            state.tieBreakPoints[team]++;
            const tbA = state.tieBreakPoints.A,
              tbB = state.tieBreakPoints.B;
            state.log.unshift(`${teamName(team)} +1 TB (${tbA}-${tbB})`);

            const tbWinner = checkTieBreakWin();
            if (tbWinner) {
              state.games[tbWinner]++;
              state.tieBreak = false;
              state.tieBreakPoints = { A: 0, B: 0 };
              state.points = { A: 0, B: 0 };
              state.log.unshift(
                `Tie-Break dimenangkan ${teamName(tbWinner)}! (Game ${state.games.A}-${state.games.B})`,
              );

              const setW = checkSetWin(state.games.A, state.games.B);
              if (setW) {
                state.setHistory.push({ A: state.games.A, B: state.games.B });
                state.setsWon[setW]++;
                state.games = { A: 0, B: 0 };
                state.log.unshift(
                  `Set untuk ${teamName(setW)} (Set ${state.setsWon.A}-${state.setsWon.B})`,
                );
                if (state.setsWon[setW] >= 2) {
                  state.matchOver = true;
                  state.winner = setW;
                  state.log.unshift(
                    `🏆 ${teamName(setW)} memenangkan pertandingan!`,
                  );
                }
              }
            }
            render();
            return;
          }

          const atDeuce =
            state.points.A >= 3 &&
            state.points.B >= 3 &&
            state.points.A === state.points.B;
          state.points[team]++;

          let gameWinner = null;
          let pointLog;
          if (state.golden && atDeuce) {
            gameWinner = team;
            pointLog = `${teamName(team)} memenangkan Golden Point! 🌟`;
          } else {
            const p = state.points[team],
              q = state.points[other];
            if (p >= 4 && p - q >= 2) gameWinner = team;
            const d = pointsDisplay();
            pointLog = `${teamName(team)} +1 poin (${d.A}-${d.B})`;
          }
          state.log.unshift(pointLog);

          if (gameWinner) {
            state.games[gameWinner]++;
            state.points = { A: 0, B: 0 };
            state.server = state.server === "A" ? "B" : "A";
            state.log.unshift(
              `Game untuk ${teamName(gameWinner)} (Game ${state.games.A}-${state.games.B})`,
            );

            const setW = checkSetWin(state.games.A, state.games.B);
            if (setW) {
              state.setHistory.push({ A: state.games.A, B: state.games.B });
              state.setsWon[setW]++;
              state.games = { A: 0, B: 0 };
              state.log.unshift(
                `Set untuk ${teamName(setW)} (Set ${state.setsWon.A}-${state.setsWon.B})`,
              );
              if (state.setsWon[setW] >= 2) {
                state.matchOver = true;
                state.winner = setW;
                state.log.unshift(
                  `🏆 ${teamName(setW)} memenangkan pertandingan!`,
                );
              }
            }
          }
          render();
        }

        function undo() {
          if (!undoStack.length) return;
          state = JSON.parse(undoStack.pop());
          render();
        }

        function resetMatch() {
          if (
            !confirm("Reset seluruh pertandingan? Riwayat poin akan dihapus.")
          )
            return;
          state = freshState(state.teamA, state.teamB);
          undoStack = [];
          prevDisplay = { A: "0", B: "0", TBA: "", TBB: "" };
          render();
        }

        function toggleTieBreak() {
          if (state.tieBreak) {
            state.tieBreak = false;
            state.tieBreakPoints = { A: 0, B: 0 };
            state.points = { A: 0, B: 0 };
            state.log.unshift("Tie-Break dimatikan, kembali ke skor normal");
          } else {
            state.tieBreak = true;
            state.points = { A: 0, B: 0 };
            state.tieBreakPoints = { A: 0, B: 0 };
            state.log.unshift("🌟 Tie-Break diaktifkan!");
          }
          render();
        }

        function leafMarkers(count) {
          let s = "";
          for (let i = 0; i < 2; i++) {
            s += i < count ? "🍁" : '<span class="leaf-empty">○</span>';
          }
          return s;
        }

        function computeStatus() {
          if (state.matchOver) {
            return {
              text: `🏆 ${teamName(state.winner)} MEMENANGKAN PERTANDINGAN!`,
              hot: true,
              over: true,
            };
          }
          if (state.tieBreak) {
            const tbA = state.tieBreakPoints.A,
              tbB = state.tieBreakPoints.B;
            if (tbA >= 6 || tbB >= 6) {
              const leader = tbA > tbB ? "A" : "B";
              return {
                text: `Tie-Break — Set Point ${teamName(leader)}!`,
                hot: true,
              };
            }
            return {
              text: `Tie-Break berlangsung (${tbA}-${tbB})`,
              hot: false,
            };
          }
          const a = state.points.A,
            b = state.points.B;
          if (a >= 3 && b >= 3 && a === b) {
            return state.golden
              ? {
                  text: "🌟 Golden Point — poin berikutnya menentukan game!",
                  hot: true,
                }
              : { text: "Deuce", hot: false };
          }
          for (const t of ["A", "B"]) {
            if (willWinGame(t)) {
              if (willWinSet(t)) {
                if (willWinMatch(t))
                  return { text: `Match Point — ${teamName(t)}`, hot: true };
                return { text: `Set Point — ${teamName(t)}`, hot: true };
              }
              return { text: `Game Point — ${teamName(t)}`, hot: true };
            }
          }
          return { text: "Pertandingan berlangsung", hot: false };
        }

        function escapeHtml(s) {
          if (typeof s !== "string") s = String(s ?? "");
          return s.replace(
            /[&<>"']/g,
            (c) =>
              ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
              })[c],
          );
        }

        function autoResize(el) {
          el.style.height = "auto";
          el.style.height = el.scrollHeight + "px";
        }

        function render() {
          els.board.classList.toggle("tie-break-active", state.tieBreak);

          if (state.matchOver) {
            els.setA.textContent = "–";
            els.setB.textContent = "–";
          } else {
            els.setA.textContent = state.games.A;
            els.setB.textContent = state.games.B;
            els.setA.className = "set-cell live";
            els.setB.className = "set-cell live";
          }

          if (state.tieBreak && !state.matchOver) {
            const tbA = state.tieBreakPoints.A,
              tbB = state.tieBreakPoints.B;
            els.tbA.textContent = tbA;
            els.tbB.textContent = tbB;
            els.tbA.className = "tb-cell tb-active";
            els.tbB.className = "tb-cell tb-active";
          } else {
            els.tbA.textContent = "–";
            els.tbB.textContent = "–";
            els.tbA.className = "tb-cell";
            els.tbB.className = "tb-cell";
          }

          if (state.matchOver) {
            els.pointsA.textContent = "–";
            els.pointsB.textContent = "–";
            els.pointsA.className = "points-cell";
            els.pointsB.className = "points-cell";
          } else if (state.tieBreak) {
            els.pointsA.textContent = "–";
            els.pointsB.textContent = "–";
            els.pointsA.className = "points-cell hidden";
            els.pointsB.className = "points-cell hidden";
          } else {
            const d = pointsDisplay();
            setFlip(els.pointsA, d.A, "A");
            setFlip(els.pointsB, d.B, "B");
          }

          els.serverDotA.classList.toggle(
            "active",
            state.server === "A" && !state.matchOver,
          );
          els.serverDotB.classList.toggle(
            "active",
            state.server === "B" && !state.matchOver,
          );

          els.leavesA.innerHTML = leafMarkers(state.setsWon.A);
          els.leavesB.innerHTML = leafMarkers(state.setsWon.B);

          const st = computeStatus();
          els.statusBanner.textContent = st.text;
          els.statusBanner.classList.toggle("hot", !!st.hot && !st.over);
          els.statusBanner.classList.toggle("match-over", !!st.over);

          els.btnA.disabled = state.matchOver;
          els.btnB.disabled = state.matchOver;

          // Terapkan fungsi pemotong nama ke tombol +1
          els.btnAName.textContent = formatBtnName(teamName("A"));
          els.btnBName.textContent = formatBtnName(teamName("B"));

          els.undoBtn.disabled = undoStack.length === 0;

          els.goldenToggle.checked = state.golden;
          els.tieBreakToggle.checked = state.tieBreak;

          els.logList.innerHTML = state.log
            .filter((l) => typeof l === "string")
            .slice(0, 40)
            .map((l) => `<li>${escapeHtml(l)}</li>`)
            .join("");
        }

        function setFlip(el, val, key) {
          el.textContent = val;
          if (prevDisplay[key] !== val) {
            el.classList.remove("flip");
            void el.offsetWidth;
            el.classList.add("flip");
            prevDisplay[key] = val;
          }
        }

        function exportToExcel() {
          const d = pointsDisplay();
          const wb = XLSX.utils.book_new();

          const summary = [
            ["MAPLE PADEL SCORING — HASIL PERTANDINGAN"],
            [],
            ["Tanggal", new Date().toLocaleString("id-ID")],
            ["Mode Golden Point", state.golden ? "Aktif" : "Nonaktif"],
            ["Mode Tie-Break", state.tieBreak ? "Aktif" : "Nonaktif"],
            [],
            [
              "Tim",
              "Set (Game)",
              "Tie-Break",
              "Poin Saat Ini",
              "Set Dimenangkan",
            ],
            [
              teamName("A"),
              state.games.A,
              state.tieBreak ? state.tieBreakPoints.A : "-",
              state.matchOver ? "-" : d.A,
              state.setsWon.A,
            ],
            [
              teamName("B"),
              state.games.B,
              state.tieBreak ? state.tieBreakPoints.B : "-",
              state.matchOver ? "-" : d.B,
              state.setsWon.B,
            ],
            [],
            [
              "Status",
              state.matchOver
                ? `${teamName(state.winner)} MEMENANGKAN PERTANDINGAN`
                : computeStatus().text,
            ],
          ];
          const ws1 = XLSX.utils.aoa_to_sheet(summary);
          ws1["!cols"] = [
            { wch: 22 },
            { wch: 14 },
            { wch: 12 },
            { wch: 16 },
            { wch: 18 },
          ];
          XLSX.utils.book_append_sheet(wb, ws1, "Hasil Pertandingan");

          const logRows = [["No", "Kejadian"]];
          state.log
            .filter((l) => typeof l === "string")
            .slice()
            .reverse()
            .forEach((l, i) => logRows.push([i + 1, l]));
          const ws2 = XLSX.utils.aoa_to_sheet(logRows);
          ws2["!cols"] = [{ wch: 6 }, { wch: 55 }];
          XLSX.utils.book_append_sheet(wb, ws2, "Riwayat Poin");

          const fname =
            `Maple_Padel_${teamName("A")}_vs_${teamName("B")}`
              .replace(/[^a-zA-Z0-9_ ]+/g, "")
              .replace(/\s+/g, "_") + ".xlsx";
          XLSX.writeFile(wb, fname);
        }

        // --- FIX: Mencegah infinite loop strip (-). Gunakan deteksi spesifik tombol Enter ---
        function handleEnter(e) {
          // Deteksi jika yang ditekan adalah tombol Enter
          if (e.key === "Enter") {
            e.preventDefault(); // Mencegah aksi enter bawaan browser

            let pos = this.selectionStart;
            let val = this.value;

            // Sisipkan turun baris, tanda strip (-), dan turun baris lagi persis di posisi kursor
            let insertStr = "\n-\n";
            this.value =
              val.substring(0, pos) +
              insertStr +
              val.substring(this.selectionEnd);

            // Pindahkan kursor langsung ke baris bawah setelah tanda strip
            this.setSelectionRange(
              pos + insertStr.length,
              pos + insertStr.length,
            );

            // Panggil event input secara manual untuk memperbarui state dan tombol +1
            this.dispatchEvent(new Event("input"));
          }
        }

        // Terapkan event keydown ke papan nama
        els.nameA.addEventListener("keydown", handleEnter);
        els.nameB.addEventListener("keydown", handleEnter);

        // Event input sekarang hanya bertugas menyimpan teks & me-resize ukuran, tidak memodifikasi isi
        els.nameA.addEventListener("input", function () {
          state.teamA = this.value;
          els.btnAName.textContent = formatBtnName(teamName("A"));
          autoResize(this);
        });

        els.nameB.addEventListener("input", function () {
          state.teamB = this.value;
          els.btnBName.textContent = formatBtnName(teamName("B"));
          autoResize(this);
        });
        // ---------------------------------------------------------------------------------

        els.btnA.addEventListener("click", () => addPoint("A"));
        els.btnB.addEventListener("click", () => addPoint("B"));
        els.undoBtn.addEventListener("click", undo);
        els.resetBtn.addEventListener("click", resetMatch);
        els.goldenToggle.addEventListener("change", (e) => {
          state.golden = e.target.checked;
          render();
        });
        els.tieBreakToggle.addEventListener("change", toggleTieBreak);
        els.serverDotA.addEventListener("click", () => {
          state.server = "A";
          render();
        });
        els.serverDotB.addEventListener("click", () => {
          state.server = "B";
          render();
        });
        els.exportBtn.addEventListener("click", exportToExcel);

        document.getElementById("fullscreenBtn").addEventListener("click", function () {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
          } else {
            document.exitFullscreen();
          }
        });

        // --- FIX: Deteksi perubahan layar (potrait/landscape) agar teks dikalkulasi ulang dan tidak kepotong ---
        window.addEventListener("resize", function () {
          autoResize(els.nameA);
          autoResize(els.nameB);
        });
        // -------------------------------------------------------------------------------------------------------

        autoResize(els.nameA);
        autoResize(els.nameB);
        render();
      })();
    </script>
<script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker berhasil didaftarkan dengan scope: ', registration.scope);
            })
            .catch(err => {
              console.log('Pendaftaran ServiceWorker gagal: ', err);
            });
        });
      }
    </script>
  </body>
